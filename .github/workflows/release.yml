name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Align versions with the git tag. Two things happen:
      #
      # 1. package.json gets the full semver (e.g., 4.0.0-beta.1) so that
      #    __APP_VERSION__ and zip filenames carry the full version string.
      #
      # 2. All manifest.json files get a numeric-only version for store
      #    compatibility. Production tags (v4.0.0) → "4.0.0". Beta tags
      #    (v4.0.0-beta.N) → "4.0.0.N" (4th component = beta number).
      #    This makes betas distinguishable from production in the browser's
      #    extension management page.
      #
      # These changes are transient — never committed back to the repo.
      - name: Align versions with tag
        run: |
          TAG="${GITHUB_REF_NAME/v/}"

          # 1. Set package.json to full semver
          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json'));p.version='$TAG';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

          # 2. Compute numeric manifest version
          if [[ "$TAG" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-beta\.([0-9]+)$ ]]; then
            MANIFEST_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            MANIFEST_VERSION="$TAG"
          fi

          echo "package.json version: $TAG"
          echo "manifest version: $MANIFEST_VERSION"

          # Patch all manifest.json files
          for manifest in manifests/*/manifest.json; do
            node -e "const fs=require('fs'),m=JSON.parse(fs.readFileSync('$manifest'));m.version='$MANIFEST_VERSION';fs.writeFileSync('$manifest',JSON.stringify(m,null,2)+'\n')"
          done

      - name: Build and package extensions
        run: npm run release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: releases/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-packages
          path: releases

      - name: List release files
        run: ls -la releases/

      # Determine release type based on tag pattern
      # Beta tags create published prereleases, production tags create published releases
      - name: Determine release type
        id: release_type
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          if [[ "$TAG_NAME" =~ -beta[.0-9]*$ ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "::notice::Detected beta release: $TAG_NAME - Creating published prerelease"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "::notice::Detected production release: $TAG_NAME - Creating published release"
          fi

      - name: Generate Release Body
        id: generate_body
        run: |
          VERSION=${GITHUB_REF_NAME/v/}
          IS_PRERELEASE="${{ steps.release_type.outputs.is_prerelease }}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            cat > release_body.md << EOF
          > ⚠️ **This is a beta build for early testing.**
          > It may contain bugs. Please report any issues you encounter.

          ## Downloads
          EOF
          else
            cat > release_body.md << EOF
          ## Downloads
          EOF
          fi

          cat >> release_body.md << EOF

          ### Chrome / Chromium
          - [open-headers-chrome-v${VERSION}.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/open-headers-chrome-v${VERSION}.zip)

          ### Firefox
          - [open-headers-firefox-v${VERSION}.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/open-headers-firefox-v${VERSION}.zip)

          ### Microsoft Edge
          - [open-headers-edge-v${VERSION}.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/open-headers-edge-v${VERSION}.zip)

          ### Safari
          - [open-headers-safari-v${VERSION}.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/open-headers-safari-v${VERSION}.zip)

          ## Installation

          ### Chrome / Edge
          1. Download the appropriate zip file
          2. Extract to a folder
          3. Go to \`chrome://extensions\` (or \`edge://extensions\`)
          4. Enable "Developer mode"
          5. Click "Load unpacked" and select the extracted folder

          ### Firefox
          1. Download the Firefox zip file
          2. Go to \`about:debugging#/runtime/this-firefox\`
          3. Click "Load Temporary Add-on"
          4. Select any file in the extracted folder

          ### Safari
          1. Download the Safari zip file
          2. Run \`xcrun safari-web-extension-converter\` on the extracted folder
          3. Build and run from Xcode
          EOF

      # Create release using softprops/action-gh-release
      # Beta tags create published prereleases, production tags create published releases
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          name: "${{ github.ref_name }}"
          files: releases/*.zip
          body_path: release_body.md
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
